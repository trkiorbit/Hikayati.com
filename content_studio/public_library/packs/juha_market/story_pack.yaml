cover: scene_01.jpeg

scenes:
  - scene: 1
    text: في صباحٍ هادئ من أيام السوق، استيقظ جحا وابنه باكراً. حمّلا سلال البلح والخبز على ظهر حمارهما الصغير، وانطلقا معاً نحو السوق البعيد. كانت الشمس تشرق برفق، وكان الطريق طويلاً.
    image: scene_01.jpeg
    audio: scene_01.mp3

  - scene: 2
    text: ركب جحا وابنه على ظهر الحمار معاً. مرّا بجوار رجل يجلس تحت شجرة، فهزّ رأسه ضاحكاً وقال انظروا إلى هذا المسكين! حمار صغير يحمل اثنين! ما أقسى قلبيهما! نظر جحا إلى ابنه، وفكّر قليلاً.
    image: scene_02.jpeg
    audio: scene_02.mp3

  - scene: 3
    text: قال جحا لابنه انزل يا بُني، لا أريد أن يقول الناس عنّا قُساة. نزل الابن ومشى بجوار الحمار، ركب جحا وحده. لكنّ صبيةً رأوهما فصاحوا يا للعجب! أبٌ يركب مرتاحاً وابنه الصغير يلهث خلفه! أين الرحمة؟
    image: scene_03.jpeg
    audio: scene_03.mp3

  - scene: 4
    text: ابتسم جحا قائلاً إذاً اركب أنت يا بُني، وأنا أمشي. نزل جحا، وركب الابن. مشيا قليلاً، فالتقاهما شيخٌ كبير ضرب الأرض بعصاه وقال غاضباً يا للأسف! ولدٌ يركب وأبوه الكبير يمشي خلفه! أين أدب الأبناء؟
    image: scene_04.jpeg
    audio: scene_04.mp3

  - scene: 5
    text: فكّر جحا طويلاً ثم قال إذاً سنمشي كلانا. نزل الابن، ومشيا معاً، والحمار يسير خلفهما خفيفاً. مرّا بفلاحٍ يحرث أرضه، فضحك بصوت عالٍ ها ها! اثنان أحمقان! عندهما حمار يستريحان عليه، ويمشيان على أقدامهما!
    image: scene_05.jpeg
    audio: scene_05.mp3

  - scene: 6
    text: توقف جحا، ونظر إلى ابنه نظرةً مرحة. قال إذاً، يا بُني، الحلّ الوحيد أن نحمل الحمار نحن! تعجّب الابن، لكنّ جحا أصرّ. حملا الحمار المسكين بصعوبة، ومضيا. ضحك كلّ من رآهما حتى أوشكوا أن يسقطوا من الضحك.
    image: scene_06.jpeg
    audio: scene_06.mp3

  - scene: 7
    text: جلس جحا وابنه على حجرٍ يستريحان، والحمار يلتقط أنفاسه. قال الابن يا أبتِ، أنا حائر! كلّما عملنا شيئاً، انتقدنا الناس. ماذا نفعل إذاً؟ ابتسم جحا، وربّت على كتف ابنه برفق.
    image: scene_07.jpeg
    audio: scene_07.mp3

  - scene: 8
    text: قال جحا بهدوء يا بُني، تعلّم اليوم درساً يدوم معك العمر كلّه لو حاولت أن ترضي كلّ الناس، فلن ترضيهم أبداً. اسمع نصيحة العقلاء، ثم افعل ما تراه صواباً، وامضِ بثقة. فإرضاء الناس غاية لا تُدرك. ابتسم الابن، وفهم.
    image: scene_08.jpeg
    audio: scene_08.mp3
