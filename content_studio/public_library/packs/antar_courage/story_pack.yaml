slug: antar_courage
id: 33333333-3333-3333-3333-333333333333
title: عنترة وذئاب الليل
summary: قصة بطولية مستوحاة من شجاعة عنترة الفارس العربي. فتى صغير في مخيم بدوي يقرر مواجهة ذئاب الصحراء وحده ليحمي قومه، ويكتشف أن الشجاعة قرار لا حجم، وأن القلب الذي يقرّر أقوى من ألف ذراع. مغامرة تعلم الأطفال معنى الإقدام.
category: مغامرات
price_credits: 12
voice_type: fable
cover: scene_07.jpeg

scenes:
  - scene: 1
    text: غربتْ الشمس فوق رمال الصحراء، وعاد عنترة الفتى من رعي الإبل. كان يحبّ هذا الوقت من اليوم، حين تشتعل نار المخيم وتتجمّع القبيلة حول الدفء. جلس بجوار جدّه الشيخ، ونظر إلى السماء التي بدأت تمتلئ بالنجوم.
    image: scene_01.jpeg
    audio: scene_01.mp3

  - scene: 2
    text: فجأة، كسر سكون الليل صوتٌ بعيد عواء طويل يأتي من خلف الكثبان. ثمّ عواء آخر، وآخر. توقّفت ضحكات الأطفال. وقف الرجال على أقدامهم. قال أحدهم بصوت مرتعش الذئاب عادت الذئاب الجائعة هذا العام.
    image: scene_02.jpeg
    audio: scene_02.mp3

  - scene: 3
    text: اقترب صوت العواء. تجمّعت الإبل ترتجف، واحتضنت الأمهات أطفالهن داخل الخيام. شدّ الرجال على عصيّهم، لكنّ أيديهم كانت ترتعش. خمس ذئاب على الأقل ربما أكثر. قال أحدهم نحن قليلون، والظلام دامس.
    image: scene_03.jpeg
    audio: scene_03.mp3

  - scene: 4
    text: سمع عنترة بكاء طفل صغير من إحدى الخيام. كان يقول لأمّه أمّي، خائف! خائف! نظر عنترة إلى وجه الطفل المرتعش، ثم إلى وجوه الرجال المترددة، ثم إلى نار المخيم المتوهجة. شيءٌ تحرّك في صدره.
    image: scene_04.jpeg
    audio: scene_04.mp3

  - scene: 5
    text: أمسك عنترة عصا الخيزران الطويلة، وانتزع شعلةً مشتعلة من النار. التفت إليه جدّه قائلاً إلى أين يا فتى؟ أنت ما زلت صغيراً! ابتسم عنترة وقال جدّي، الشجاعة ليست في الحجم، بل في القرار. سأذهب.
    image: scene_05.jpeg
    audio: scene_05.mp3

  - scene: 6
    text: خرج عنترة من المخيم نحو الكثبان. كان قلبه يدقّ بقوة، لكنّ قدميه كانتا ثابتتين. رأى عيوناً ذهبية تلمع في الظلام واحدة، اثنتان، خمس. تقدّم بخطوة، ورفع شعلته عالياً. الذئاب توقّفت ونظرت.
    image: scene_06.jpeg
    audio: scene_06.mp3

  - scene: 7
    text: صرخ عنترة بكلّ ما في صدره صرخةً طويلة، وضرب الأرض بعصاه. لوّح بالشعلة في كلّ اتجاه. صرخ مرّة أخرى، وكأنّ خلفه ألف فارس. تردّد صوته بين الكثبان. تراجعت الذئاب خطوة، ثم خطوتين، ثم اختفت في الليل.
    image: scene_07.jpeg
    audio: scene_07.mp3

  - scene: 8
    text: عاد عنترة إلى المخيم، وجبينه يلمع بالعرق، وعصاه على كتفه. كان الجميع ينتظرون. ركض إليه الطفل الصغير وعانقه دون أن يقول كلمة. وقف الرجال يصفّقون بصمت. ابتسمت الأمّهات. رفع الجدّ يده إلى السماء شاكراً.
    image: scene_08.jpeg
    audio: scene_08.mp3

  - scene: 9
    text: جلس الجدّ بجوار عنترة عند النار، ووضع يده على كتفه قائلاً يا بُني، تعلّمتُ الليلة منك أنا قبل أن تتعلّم منّي. الشجاعة ليست أن تكبر فتشجع، بل أن تشجع فتكبر. والقلب الذي يقرّر، أقوى من ألف ذراع. اذكر هذا الليلة كلّ يوم.
    image: scene_09.jpeg
    audio: scene_09.mp3
