slug: sulayman_ant
id: 44444444-4444-4444-4444-444444444444
title: سيدنا سليمان والنملة الحكيمة
summary: قصة من القرآن الكريم عن نبيّ الله سليمان عليه السلام الذي علّمه الله منطق الطير، ولقائه بنملة صغيرة حذّرت قومها من موكبه. تعلّم القصة الأطفال أن العظيم من يتواضع للصغير، وأن لكل مخلوق شأناً عند الله.
category: قصص الأنبياء
price_credits: 12
voice_type: fable
cover: scene_06.jpeg

scenes:
  - scene: 1
    text: في زمنٍ بعيد، أكرم الله سيدنا سليمان عليه السلام بمُلكٍ عظيم لم يُؤتَه أحدٌ من قبله. سخّر له الجنّ والإنس والطير والريح. يومئذٍ، تحرّك موكبه المهيب فوق وادٍ أخضر، والرايات تخفق، والهدهد يطير في المقدّمة.
    image: scene_01.jpeg
    audio: scene_01.mp3

  - scene: 2
    text: كان الوادي مليئاً بالخير. أزهارٌ ملوّنة، وأنهارٌ صغيرة تمرّ بين الحصى، وفراشات ترفّ فوق العشب. ولكن في زاويةٍ صغيرة من الوادي، كانت تعيش مملكة كبيرة لا يراها أحد بسهولة مملكة النمل.
    image: scene_02.jpeg
    audio: scene_02.mp3

  - scene: 3
    text: كانت نملةٌ صغيرة تقف على حجرٍ صغير. سمعت دويّ خطوات بعيدة تقترب. رفعت رأسها، فرأت غباراً يتصاعد، ورايات تلوح، وضوءاً يقترب. عرفت في الحال أنّ موكب النبيّ سيمرّ من فوق الوادي.
    image: scene_03.jpeg
    audio: scene_03.mp3

  - scene: 4
    text: قالت النملة الصغيرة بصوت واضح يا أيّها النمل، ادخلوا مساكنكم! لا يحطمنّكم سليمان وجنوده وهم لا يشعرون! انتشر صوتها بين رفيقاتها، فهرعت كلّ نملة إلى بيتها، تتسابق إلى الأمان.
    image: scene_04.jpeg
    audio: scene_04.mp3

  - scene: 5
    text: كان الموكب على بُعد أمتار. لكنّ سيدنا سليمان عليه السلام، الذي علّمه الله منطق الطير والحيوان، سمع كلام النملة الصغيرة من بعيد. توقّف. أمر الموكب أن يقف. التفت نحو الوادي.
    image: scene_05.jpeg
    audio: scene_05.mp3

  - scene: 6
    text: ابتسم سيدنا سليمان عليه السلام ابتسامةً عظيمة. عَجِبَ من حكمة هذه النملة الصغيرة، التي عرفت اسمه واسم جنوده، وحذّرت قومها برحمة وذكاء. ثمّ رفع وجهه إلى السماء.
    image: scene_06.jpeg
    audio: scene_06.mp3

  - scene: 7
    text: دعا سيدنا سليمان عليه السلام ربّه قائلاً ربِّ أوزِعني أن أشكر نعمتك التي أنعمتَ عليَّ وعلى والديَّ، وأن أعمل صالحاً ترضاه، وأدخلني برحمتك في عبادك الصالحين. كان دعاؤه نبراساً لكلّ مَن يسمعه إلى يومنا هذا.
    image: scene_07.jpeg
    audio: scene_07.mp3

  - scene: 8
    text: أمر سيدنا سليمان عليه السلام جنوده أن يمرّوا برفق، وألّا يطؤوا بيوت النمل. مرّ الموكب بهدوء على أطراف الوادي. ولم يُؤذَ نملةٌ واحدة. كان النبيّ يعلم أنّ كلّ مخلوق له شأنٌ عند الله، صغيراً كان أو كبيراً.
    image: scene_08.jpeg
    audio: scene_08.mp3

  - scene: 9
    text: أمّا داخل مملكة النمل، فكانت النملات يتحدّثن عن النملة الحكيمة. ابتسمت ملكة النمل وقالت الحكمة لا تُقاس بالحجم. الكلمة الصغيرة قد تُنقذ مملكة كاملة. ضحكت النمل الصغيرات بفرح.
    image: scene_09.jpeg
    audio: scene_09.mp3

  - scene: 10
    text: وهكذا، علّمنا الله في كتابه الكريم قصّةً عظيمة عن نبيّه الحكيم، وعن نملةٍ صغيرة. تعلَّمْ يا صغيري العظيم من يتواضع للصغير، والحكيم من يُصغي للكلمة الصغيرة. وكلّ مخلوقٍ خَلَقَه الله، له شأنٌ يُذكر.
    image: scene_10.jpeg
    audio: scene_10.mp3
